name: CI

on:
  pull_request:

jobs:
  validate:
    name: Validate Presets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Validate preset files
        run: |
          EXIT_CODE=0
          for f in *.json; do
            echo "Validating ${f}..."
            if ! npx --yes renovate-config-validator --strict --no-global "${f}" 2>&1 | grep -v "^npm warn"; then
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE
